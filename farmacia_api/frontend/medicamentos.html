<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">

    <!-- ✅ CORREÇÃO IMPORTANTE -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Medicamentos - Farmácia CV</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-brand mb-4">
            <span class="fs-4">💊 Farmácia CV</span>
        </div>
        <ul class="sidebar-nav">
            <li><a href="dashboard.html"><span class="nav-icon">📊</span> Dashboard</a></li>
            <li><a href="medicamentos.html" class="active"><span class="nav-icon">💊</span> Medicamentos</a></li>
            <li><a href="clientes.html"><span class="nav-icon">🧑‍🤝‍🧑</span> Clientes</a></li>
            <li><a href="usuarios.html"><span class="nav-icon">👥</span> Utilizadores</a></li>
            <li><a href="vendas.html"><span class="nav-icon">🛒</span> Vendas</a></li>
        </ul>
    </aside>

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-white shadow-sm main-navbar">
        <div class="d-flex align-items-center gap-3">
            <button class="menu-toggle" title="Menu">☰</button>
            <span class="navbar-brand fw-bold m-0 p-0">💊 Medicamentos</span>
        </div>
        <div>
            <button class="btn btn-outline-danger btn-sm rounded-pill px-3" onclick="logout()">Sair</button>
        </div>
    </nav>

    <div class="main-content">
    <h3 class="p-4">💊 Gestão de Medicamentos</h3>

    <!-- FORM -->
    <div class="card-box mb-3">

        <input id="nome" class="form-control mb-2" placeholder="Nome">
        <input id="preco" type="number" class="form-control mb-2" placeholder="Preço">
        <input id="estoque" type="number" class="form-control mb-2" placeholder="Estoque">

        <button class="btn btn-success" onclick="adicionar()">Adicionar</button>

    </div>

    <!-- TABELA -->
    <table class="table table-bordered bg-white">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Preço</th>
                <th>Estoque</th>
                <th>Ações</th>
            </tr>
        </thead>

        <tbody id="tabela"></tbody>
    </table>
    </div>

    <script>

        const token = localStorage.getItem("token");

        // proteção login
        if (!token) {
            alert("Faça login primeiro!");
            window.location.href = "login.html";
        }

        // 🔄 LISTAR
        async function carregar() {

            try {
                const res = await fetch("http://127.0.0.1:8000/medicamentos", {
                    headers: {
                        "Authorization": "Bearer " + token
                    }
                });

                const data = await res.json();

                if (!res.ok) {
                    alert(data.detail || "Erro ao carregar medicamentos");
                    return;
                }

                let tabela = "";

                data.forEach(m => {
                    tabela += `
                <tr>
                    <td>${m.id}</td>
                    <td>${m.nome}</td>
                    <td>${m.preco}</td>
                    <td>${m.estoque}</td>
                    <td>
                        <button class="btn btn-warning btn-sm" onclick="editar(${m.id})">Editar</button>
                        <button class="btn btn-danger btn-sm" onclick="apagar(${m.id})">Apagar</button>
                    </td>
                </tr>
            `;
                });

                document.getElementById("tabela").innerHTML = tabela;

            } catch (err) {
                console.log(err);
                alert("Erro de conexão com o servidor");
            }
        }

        // ➕ ADICIONAR
        async function adicionar() {

            const nome = document.getElementById("nome").value.trim();
            const preco = document.getElementById("preco").value;
            const estoque = document.getElementById("estoque").value;

            if (!nome || !preco || !estoque) {
                alert("Preencha todos os campos!");
                return;
            }

            await fetch("http://127.0.0.1:8000/medicamentos", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify({ nome, preco, estoque })
            });

            document.getElementById("nome").value = "";
            document.getElementById("preco").value = "";
            document.getElementById("estoque").value = "";

            carregar();
        }

        // ✏️ EDITAR
        async function editar(id) {

            const nome = prompt("Novo nome:");
            const preco = prompt("Novo preço:");
            const estoque = prompt("Novo estoque:");

            if (!nome || !preco || !estoque) return;

            await fetch(`http://127.0.0.1:8000/medicamentos/${id}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify({ nome, preco, estoque })
            });

            carregar();
        }

        // 🗑️ APAGAR
        async function apagar(id) {

            if (!confirm("Tens certeza que quer apagar?")) return;

            await fetch(`http://127.0.0.1:8000/medicamentos/${id}`, {
                method: "DELETE",
                headers: {
                    "Authorization": "Bearer " + token
                }
            });

            carregar();
        }

        // logout
        function logout() {
            localStorage.removeItem("token");
            window.location.href = "login.html";
        }

        // iniciar
        carregar();

    </script>

</body>

</html>
