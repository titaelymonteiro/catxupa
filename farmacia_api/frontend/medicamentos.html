<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">

    <!-- ✅ CORREÇÃO IMPORTANTE -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Medicamentos - Farmácia CV</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-brand mb-4">
            <span class="fs-4">📊 Dashboard</span>
        </div>
        <ul class="sidebar-nav">
            <li><a href="dashboard.html"><span class="nav-icon">📊</span> Dashboard</a></li>
            <li><a href="medicamentos.html" class="active"><span class="nav-icon">💊</span> Medicamentos</a></li>
            <li><a href="clientes.html"><span class="nav-icon">🧑‍🤝‍🧑</span> Clientes</a></li>
            <li><a href="usuarios.html"><span class="nav-icon">👥</span> Utilizadores</a></li>
            <li><a href="vendas.html"><span class="nav-icon">🛒</span> Vendas</a></li>
            <li><a href="relatorios.html"><span class="nav-icon">📈</span> Relatórios</a></li>
            <li><a href="auditoria.html"><span class="nav-icon">📜</span> Auditoria</a></li>
        </ul>
    </aside>

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-white shadow-sm main-navbar">
        <div class="d-flex align-items-center gap-3">
            <button class="menu-toggle" title="Menu">☰</button>
            <div class="d-flex align-items-center gap-2">
                <img src="assets/logo.jpg" alt="Logo" style="height: 32px; width: 32px; border-radius: 6px; object-fit: cover;">
                <span class="navbar-brand fw-bold m-0 p-0">Farmácia CV</span>
            </div>
        </div>
        <div>
            <button class="btn btn-outline-danger btn-sm rounded-pill px-3" onclick="logout()">Sair</button>
        </div>
    </nav>

    <div class="main-content">
        <h3 class="p-4">💊 Gestão de Medicamentos</h3>

        <!-- FORM -->
        <div class="card-box mb-3">

            <div class="row g-2">
                <div class="col-md-4">
                    <input id="nome" class="form-control" placeholder="Nome">
                </div>
                <div class="col-md-3">
                    <input id="categoria" class="form-control" placeholder="Categoria">
                </div>
                <div class="col-md-2">
                    <input id="preco" type="number" class="form-control" placeholder="Preço">
                </div>
                <div class="col-md-1">
                    <input id="estoque" type="number" class="form-control" placeholder="Stock">
                </div>
                <div class="col-md-2">
                    <input id="validade" type="date" class="form-control" title="Data de Validade">
                </div>
            </div>

            <button class="btn btn-success mt-3" onclick="adicionar()">➕ Adicionar Medicamento</button>

        </div>

        <!-- TABELA -->
        <table class="table table-bordered bg-white">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Categoria</th>
                    <th>Preço</th>
                    <th>Estoque</th>
                    <th>Validade</th>
                    <th>Ações</th>
                </tr>
            </thead>

            <tbody id="tabela"></tbody>
        </table>
    </div>

    <script>
        protegerPagina();
        const token = getToken();
        let medicamentosGlobal = [];

        // 🔄 LISTAR
        async function carregar() {
            try {
                const res = await fetch(`${API_URL}/medicamentos`, {
                    headers: authHeaders()
                });

                const data = await res.json();
                medicamentosGlobal = data;

                if (!res.ok) {
                    alert(data.detail || "Erro ao carregar medicamentos");
                    return;
                }

                let tabela = "";

                data.forEach(m => {
                    const hoje = new Date();
                    const dataValidade = m.validade ? new Date(m.validade) : null;
                    const diffDias = dataValidade ? Math.ceil((dataValidade - hoje) / (1000 * 60 * 60 * 24)) : 999;

                    let classeLinha = "";
                    if (m.estoque < 10) classeLinha = "table-warning";
                    if (diffDias >= 0 && diffDias <= 30) classeLinha = "table-danger";

                    tabela += `
                <tr class="${classeLinha}">
                    <td>${m.id}</td>
                    <td><strong>${m.nome}</strong></td>
                    <td><span class="badge bg-secondary">${m.categoria || "—"}</span></td>
                    <td>${parseFloat(m.preco).toLocaleString('pt-CV')} CVE</td>
                    <td>${m.estoque}</td>
                    <td>${m.validade || "—"}</td>
                    <td>
                        <button class="btn btn-warning btn-sm" onclick="editar(${m.id})">Editar</button>
                        <button class="btn btn-danger btn-sm" onclick="apagar(${m.id})">Apagar</button>
                    </td>
                </tr>
            `;
                });

                document.getElementById("tabela").innerHTML = tabela;

            } catch (err) {
                console.log(err);
                alert("Erro de conexão com o servidor");
            }
        }

        // ➕ ADICIONAR
        async function adicionar() {

            const nome = document.getElementById("nome").value.trim();
            const categoria = document.getElementById("categoria").value.trim();
            const preco = document.getElementById("preco").value;
            const estoque = document.getElementById("estoque").value;
            const validade = document.getElementById("validade").value;

            if (!nome || !preco || !estoque) {
                alert("Nome, Preço e Stock são obrigatórios!");
                return;
            }

            const res = await fetch(`${API_URL}/medicamentos`, {
                method: "POST",
                headers: authHeaders(),
                body: JSON.stringify({ nome, preco: parseFloat(preco), estoque: parseInt(estoque), validade, categoria })
            });

            if (res.ok) {
                document.getElementById("nome").value = "";
                document.getElementById("categoria").value = "";
                document.getElementById("preco").value = "";
                document.getElementById("estoque").value = "";
                document.getElementById("validade").value = "";
                carregar();
            } else {
                const data = await res.json();
                alert("Erro ao adicionar: " + (data.detail || "Erro inesperado"));
            }
        }

        // ✏️ EDITAR
        async function editar(id) {

            const u = medicamentosGlobal.find(m => m.id === id);
            const nome = prompt("Novo nome:", u.nome);
            const categoria = prompt("Nova categoria:", u.categoria);
            const preco = prompt("Novo preço:", u.preco);
            const estoque = prompt("Novo estoque:", u.estoque);
            const validade = prompt("Nova validade (YYYY-MM-DD):", u.validade);

            if (!nome || !preco || !estoque) return;

            const res = await fetch(`${API_URL}/medicamentos/${id}`, {
                method: "PUT",
                headers: authHeaders(),
                body: JSON.stringify({ 
                    nome, 
                    preco: parseFloat(preco), 
                    estoque: parseInt(estoque), 
                    validade, 
                    categoria 
                })
            });

            if (res.ok) {
                alert("Medicamento atualizado com sucesso!");
                carregar();
            } else {
                const data = await res.json();
                alert("Erro ao atualizar: " + (data.detail || "Acesso negado"));
            }
        }

        // 🗑️ APAGAR
        async function apagar(id) {

            if (!confirm("Tens certeza que quer apagar?")) return;

            const res = await fetch(`${API_URL}/medicamentos/${id}`, {
                method: "DELETE",
                headers: authHeaders()
            });

            if (res.ok) {
                carregar();
            } else {
                alert("Erro ao apagar. Verifique se tem permissões de administrador.");
            }
        }

        // logout
        function logout() {
            localStorage.removeItem("token");
            window.location.href = "login.html";
        }

        // iniciar
        carregar();

    </script>

</body>

</html>
