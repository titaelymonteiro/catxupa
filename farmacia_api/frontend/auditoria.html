<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico de Auditoria - Farmácia CV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-brand mb-4">
            <span class="fs-4">📊 Dashboard</span>
        </div>
        <ul class="sidebar-nav">
            <li><a href="dashboard.html"><span class="nav-icon">📊</span> Dashboard</a></li>
            <li><a href="medicamentos.html"><span class="nav-icon">💊</span> Medicamentos</a></li>
            <li><a href="clientes.html"><span class="nav-icon">🧑‍🤝‍🧑</span> Clientes</a></li>
            <li><a href="usuarios.html"><span class="nav-icon">👥</span> Utilizadores</a></li>
            <li><a href="vendas.html"><span class="nav-icon">🛒</span> Vendas</a></li>
            <li><a href="relatorios.html"><span class="nav-icon">📈</span> Relatórios</a></li>
            <li><a href="auditoria.html" class="active"><span class="nav-icon">📜</span> Auditoria</a></li>
        </ul>
    </aside>

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-white shadow-sm main-navbar">
        <div class="d-flex align-items-center gap-3">
            <button class="menu-toggle" title="Menu">☰</button>
            <div class="d-flex align-items-center gap-2">
                <img src="assets/logo.jpg" alt="Logo" style="height: 32px; width: 32px; border-radius: 6px; object-fit: cover;">
                <span class="navbar-brand fw-bold m-0 p-0">Farmácia CV</span>
            </div>
        </div>
        <div>
            <button class="btn btn-outline-danger btn-sm rounded-pill px-3" onclick="logout()">Sair</button>
        </div>
    </nav>

    <div class="container py-4 main-content">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h4 class="fw-bold text-secondary mb-1">📜 Logs de Auditoria</h4>
                <p class="text-muted small mb-0">Rastreio completo de ações e alterações no sistema.</p>
            </div>
            <button class="btn btn-outline-primary btn-sm" onclick="carregar()">
                🔄 Atualizar
            </button>
        </div>

        <!-- MENSAGEM -->
        <div id="mensagem" class="alert d-none mb-3"></div>

        <!-- FILTROS (Opcional Futuro) -->

        <!-- TABELA -->
        <div class="card-box">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Data e Hora</th>
                            <th>Utilizador</th>
                            <th>Ação</th>
                            <th>Detalhes</th>
                        </tr>
                    </thead>
                    <tbody id="tabela">
                        <tr>
                            <td colspan="4" class="text-center py-5">
                                <div class="spinner-border text-primary spinner-border-sm me-2"></div>
                                A carregar histórico...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
    <script>
        protegerPagina();
        const token = getToken();

        function mostrarMensagem(texto, tipo = "success") {
            const el = document.getElementById("mensagem");
            el.className = `alert alert-${tipo}`;
            el.innerText = texto;
            el.classList.remove("d-none");
            setTimeout(() => el.classList.add("d-none"), 4000);
        }

        async function carregar() {
            console.log("A carregar auditoria...");
            const tabela = document.getElementById("tabela");
            // Mostrar estado de carregamento
            tabela.innerHTML = `<tr><td colspan="4" class="text-center py-5">
                <div class="spinner-border text-primary spinner-border-sm me-2"></div>
                A atualizar histórico...
            </td></tr>`;

            try {
                const res = await fetch(`${API_URL}/auditoria`, {
                    headers: authHeaders()
                });

                if (res.status === 401) { logout(); return; }
                if (res.status === 403) {
                    tabela.innerHTML =
                        "<tr><td colspan='4' class='text-center text-danger py-5'>⛔ Acesso restrito a administradores.</td></tr>";
                    return;
                }

                const data = await res.json();

                if (data.length === 0) {
                    tabela.innerHTML =
                        "<tr><td colspan='4' class='text-center text-muted py-5'>Nenhum registo encontrado.</td></tr>";
                    return;
                }

                tabela.innerHTML = data.map(log => {
                    const dataObj = new Date(log.data_hora + "Z"); // Forçar UTC
                    const dataFmt = isNaN(dataObj.getTime()) ? log.data_hora : dataObj.toLocaleString('pt-PT');

                    let badgeClass = "bg-secondary";
                    const acao = log.acao.toLowerCase();
                    if (acao.includes("criou")) badgeClass = "bg-success";
                    if (acao.includes("eliminou") || acao.includes("apagou") || acao.includes("removeu")) badgeClass = "bg-danger";
                    if (acao.includes("alterou") || acao.includes("editou") || acao.includes("atualizou")) badgeClass = "bg-warning text-dark";
                    if (acao.includes("venda") || acao.includes("vendeu")) badgeClass = "bg-info text-white";

                    return `<tr>
                        <td class="text-muted small">${dataFmt}</td>
                        <td class="fw-semibold text-dark">${log.usuario}</td>
                        <td><span class="badge ${badgeClass}">${log.acao}</span></td>
                        <td class="small text-secondary">${log.detalhes || '—'}</td>
                    </tr>`;
                }).join("");

            } catch (err) {
                console.error(err);
                tabela.innerHTML = "<tr><td colspan='4' class='text-center text-danger py-5'>Erro ao ligar ao servidor.</td></tr>";
                mostrarMensagem("Erro ao carregar auditoria.", "danger");
            }
        }

        carregar();
    </script>
</body>

</html>
